<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片编辑器</title>
    <link rel="stylesheet" href="image-editor.css">
</head>
<body>
    <div class="editor-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="brand">
                    <img src="Title.png" alt="Title" class="brand-logo">
                </div>
                <div class="tool-group">
                    <button class="tool-btn" data-tool="pointer" title="指针">
                        <img src="pointer.svg" width="20" height="20" alt="指针">
                    </button>
                    <button class="tool-btn active" data-tool="rectangle" title="框选">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="line" title="划线">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="arrow" title="箭头">
                        <img src="arrow.svg" width="20" height="20" alt="箭头">
                    </button>
                    <button class="tool-btn" data-tool="text" title="文本">
                        <img src="script.svg" width="20" height="20" alt="文本">
                    </button>
                    <button class="tool-btn" data-tool="blur" title="打码">
                        <img src="m.svg" width="20" height="20" alt="打码">
                    </button>
                </div>
            </div>
            
            <div class="toolbar-right">
                <div class="tool-group">
                    <div class="color-size-controls">
                        <div class="color-picker">
                            <label>颜色:</label>
                            <input type="color" id="colorPicker" value="#FF3B30">
                        </div>
                        <div class="size-picker">
                            <label>大小:</label>
                            <input type="number" id="sizePicker" value="3" min="1" max="50">
                            <span>px</span>
                        </div>
                    </div>
                    <button class="tool-btn" id="undoBtn" title="撤回">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7v6h6"/>
                            <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
                        </svg>
                    </button>
                    <button class="tool-btn" id="redoBtn" title="恢复">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 7v6h-6"/>
                            <path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/>
                        </svg>
                    </button>
                    <button class="tool-btn primary" id="completeBtn" title="完成">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        <span>完成</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 图片浏览区 -->
        <div class="image-area">
            <div class="canvas-container">
                <canvas id="imageCanvas"></canvas>
                <canvas id="editCanvas"></canvas>
            </div>
        </div>
    </div>

  
    <script src="image-editor.js"></script>
</body>
</html>
